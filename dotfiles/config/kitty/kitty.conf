# Kitty Configuration - Lumethik Elite Terminal

# --- Font ---
font_family      JetBrainsMono Nerd Font
font_size        10.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# --- Cursor ---
cursor_shape     beam
cursor_blink_interval 0.5

# --- Window ---
window_padding_width 12
background_opacity 0.90
confirm_os_window_close 0
# Forzamos que se vean los botones de cerrar/maximizar (decoraciones)
linux_display_server x11
hide_window_decorations no

# --- Color Scheme (Gruvbox Dark Hard) ---
background            #282828
foreground            #ebdbb2
cursor                #ebdbb2
selection_background  #504945
selection_foreground  #ebdbb2

# Black
color0  #282828
color8  #928374
# Red
color1  #cc241d
color9  #fb4934
# Green
color2  #98971a
color10 #b8bb26
# Yellow
color3  #d79921
color11 #fabd2f
# Blue
color4  #458588
color12 #83a598
# Magenta
color5  #b16286
color13 #d3869b
# Cyan
color6  #689d6a
color14 #8ec07c
# White
color7  #a89984
color15 #ebdbb2

# --- Shortcuts (Windows-like Copy/Paste) ---
# Map Ctrl+C to copy if text is selected, otherwise it acts as usual interrupt.
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard

# --- Other Settings ---
scrollback_lines 5000
enable_audio_bell no
detect_urls yes
url_color #83a598
url_style curly
